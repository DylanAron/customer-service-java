server:
  port: 8089
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 60s

  datasource:
    url: jdbc:mysql://localhost:3306/customer-service?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
    username: sportsAdmin
    password: aw87eCTwSyhhids6.
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  sql:
    init:
      mode: never                 # 生产环境禁用自动建表，需手动执行 schema.sql

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.customer.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl   # 生产环境关闭 SQL 日志

websocket:
  port: 9090
  boss-threads: 1       # 接受连接线程（固定 1）
  worker-threads: 0     # 0 = Netty 默认，高并发可手动设为 CPU 核数 × 4

jwt:
  secret: customer-service-secret-key-2024-very-secure
  expiration: 86400000

# ========== File Storage ==========
storage:
  local:
    base-path: /data/soccer/uploadPath
  url-prefix: /profile
