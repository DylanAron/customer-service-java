# ============================================================
# 客服系统 — Nginx HTTPS 反向代理配置
#
# 适用场景：单 JAR 部署（前端打包在后端 JAR 中）
# 前端页面由 Spring Boot 在 8080 端口直接提供。
#
# 部署方式：
#   1. 修改 server_name 为你的域名
#   2. 将 SSL 证书放在 /etc/nginx/certs/ 下
#   3. 软链：ln -s /etc/nginx/sites-available/customer-service /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx
#
# 端口说明：
#   443  — 所有流量入口（前端页面 + REST API + 文件 + WebSocket）
#   80   — HTTP 强制跳转到 HTTPS
#   8080 — 后端（Nginx 内部代理，不直接暴露）
#   9090 — Netty WebSocket（Nginx 内部代理，不直接暴露）
# ============================================================

# WebSocket 升级时 Connection 头必须为 "upgrade"，否则为 "close"
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}

server {
    listen 443 ssl;             # 不开启 http2，避免 Android WebSocket 兼容问题
    listen [::]:443 ssl;
    server_name your-domain.com;   # ← 修改为你的域名

    # ========== SSL 证书 ==========
    ssl_certificate     /etc/nginx/certs/your-domain.com.pem;
    ssl_certificate_key /etc/nginx/certs/your-domain.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ========== 后端 API 代理 ==========
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    120s;

        # 限制请求体大小（与后端 application-prod.yml 的 max-file-size 一致）
        client_max_body_size 60m;
    }

    # ========== 文件上传访问 ==========
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ========== WebSocket 代理 ==========
    # 注意：此 location 必须放在 location / 之前，否则会先匹配 /
    location /ws {
        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;

        # WebSocket 必须的头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 关闭缓冲（WebSocket 实时通信必需）
        proxy_buffering off;
        proxy_cache off;

        # 长连接超时（1 小时）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ========== 前端页面 + 其余所有请求 ==========
    # 单 JAR 部署时，前端静态文件在 JAR 内部由 Spring Boot 提供
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # index.html 不缓存，确保更新后用户立即看到新版
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# ============================================================
# HTTP → HTTPS 强制跳转
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    return 301 https://$host$request_uri;
}
